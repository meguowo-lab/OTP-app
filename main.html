<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">
        <script>
            class MiniCard extends HTMLElement {
                constructor() {
                    super();
                    const template = document.getElementById('mini-card');
                    const content = template.content.cloneNode(true);
                    this.attachShadow({ mode: 'open' }).appendChild(content);
                }

                connectedCallback() {
                    const text = this.getAttribute('text');
                    const imgHref = this.getAttribute('imgHref');
                    
                    this.shadowRoot.querySelector('.text').textContent = text;
                    this.shadowRoot.querySelector('.img').src = imgHref;
                }
            }

            customElements.define('mini-card', MiniCard);
            console.log("aaa")
        </script>
    
        <style>
            *{
                font-family: "Onest", sans-serif;
                font-optical-sizing: auto;
                font-style: normal;
                --color-primary:#C1FF05;
                --color-accent:#FF7F32;
                --color-secondary: #9E6FC3;
                --non-content-size: 10vh
            }
            
            header{
                background-color: #9E6FC3;
                height: var(--non-content-size);
            }
            
            footer{
                width: 100%;
                height: var(--non-content-size);
                background-color: #FF7F32;
            }

            body{
                width: 100%;
                display: flex;
                justify-content: center;
                background-color: darkslategray;
            }
            
            .content > section{
                flex-grow: 1;
                overflow-y: auto;
                padding: 0 8px 0 8px;
            }
            
            .content{
                background-color: #F3F4F6;
                margin: 0;
                width: 402px;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            
            .card{
                display: flex;
                width: 100%;
                height: 100%;
                border-radius: 16px;
                background-color: white;
                justify-content: center;
                align-items: center;
            }

            .card-card{
                
            }

            .pay-grid{
                row-gap: 8px;
                display: grid;
                grid-template-rows: 1fr 1fr;
                width: 56px;
                height: 136px;
                height: fit-content;
            }
            .card-info{
                display: flex;
            }
            img{
                width: 100%;
                height: 100%;
            }
        </style>
    </head>

    <body>
        <template id="mini-card">
            <style>
                .text{
                    color: white;
                    position: absolute;
                    bottom: 0;
                    height: 33%;
                    width: 100%;
                    word-break: break-word;
                    margin: 0 0 16px 8px;
                    left: 0;

                }

                .content{
                    width: 120px;
                    position: relative;
                }

            </style>
            <div class="content">
                <img class="img">
                <p class="text"></p>
            </div>
        </template>
        <div class="content">
    
            <header>
                hi
            </header>
            <section id="content-body">
    
                <div>
                    <mini-card text="Актуальные сценарии" imgHref="imgs/Plain.png"></mini-card>
                </div>
                <section>
                    <section>
                        <p>В кошельке</p>
                        <p>73 518, 64Р</p>
                    </section>
                    <section class="card-info">
                        <div class="pay-grid">
                            <div class="card">
                                <svg width="24px" height="24px" xmlns="http://www.w3.org/2000/svg" style="padding: 8px;">
                                    <use xlink:href="icons.svg#sbp-icon"></use>
                                </svg>
                            </div>
                            <div class="card">
                                <svg width="18px" height="18px" xmlns="http://www.w3.org/2000/svg" style="padding: 8px;">
                                    <use xlink:href="icons.svg#qr-icon"></use>
                                </svg>
                            </div>
                        </div>
                        <div class="card" style="height: 147; width: 120;">
                            <img href="imgs/card.png">
                        </div>
                    </section>
                </section>
            </section>
            <footer>
                <div>
                    <svg width="64px" height="64px"><use width="32px" height="32px" href="icons.svg#otp-icon"></use></svg>
                </div>
            </footer>
        </div>
    </body>
</html>
